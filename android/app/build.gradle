plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.proj.kavi"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        // Application ID (package name)
        applicationId = "com.proj.kavi"
        // Android minimum SDK version, specified in flutter.minSdkVersion
        minSdk = flutter.minSdkVersion
        // Android target SDK version, specified in flutter.targetSdkVersion
        targetSdk = flutter.targetSdkVersion
        // Version code for the app (used for versioning in the Play Store)
        versionCode = flutterVersionCode.toInteger()
        // Version name for the app (shown to users)
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Release signing configuration (use your own signing config in production)
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    // Specify the path to the Flutter source code (relative to the location of the `build.gradle`)
    source = "../.."
}

dependencies {
    // JUnit testing library for unit tests
    testImplementation 'junit:junit:4.12'

    // AndroidX Test libraries for UI and instrumentation tests
    androidTestImplementation 'androidx.test:runner:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.1'

    // Exclude the conflicting kotlin-stdlib-jdk8 dependency and use kotlin-stdlib instead
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
